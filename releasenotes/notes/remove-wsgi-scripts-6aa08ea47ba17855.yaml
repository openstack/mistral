---
upgrade:
  - |
    The ``mistral-wsgi-api`` WSGI script, previously generated by pbr, has
    been removed. Deployment tooling should instead reference the Python
    module path ``mistral.wsgi:application`` if the chosen WSGI server
    supports it (gunicorn, uWSGI), or implement a ``.wsgi`` script wrapping
    it otherwise (mod_wsgi).
