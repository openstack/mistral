# variables in body
action_created_at:
  description: |
    The date and time when the action was created.
  in: body
  required: true
  type: string

action_definition:
  description: |
    The action definition written in Mistral v2 DSL.
  in: body
  required: true
  type: string

action_description:
  description: |
    A description of the action. Inferred from the action definition
    on creation.
  in: body
  required: false
  type: string

action_id:
  description: |
    The UUID of the action.
  in: body
  required: true
  type: string

action_input:
  description: |
    The input parameter definitions for the action.
  in: body
  required: false
  type: string

action_is_system:
  description: |
    Whether the action is a built-in system action.
  in: body
  required: false
  type: boolean

action_name:
  description: |
    The name of the action. Immutable; inferred from the action definition
    on creation.
  in: body
  required: true
  type: string

action_namespace:
  description: |
    The namespace of the action.
  in: body
  required: false
  type: string

action_project_id:
  description: |
    The UUID of the project that owns the action.
  in: body
  required: false
  type: string

action_scope:
  description: |
    The scope of the action. ``private`` or ``public``.
  in: body
  required: false
  type: string

action_tags:
  description: |
    A list of tags associated with the action.
  in: body
  required: false
  type: array

action_updated_at:
  description: |
    The date and time when the action was last updated.
  in: body
  required: false
  type: string

actions:
  description: |
    A list of action objects.
  in: body
  required: true
  type: array

cron_trigger_created_at:
  description: |
    The date and time when the cron trigger was created.
  in: body
  required: true
  type: string

cron_trigger_first_execution_time:
  description: |
    The date and time of the first execution. If not specified, the first
    execution is determined by the cron pattern.
  in: body
  required: false
  type: string

cron_trigger_id:
  description: |
    The UUID of the cron trigger.
  in: body
  required: true
  type: string

cron_trigger_name:
  description: |
    The name of the cron trigger.
  in: body
  required: true
  type: string

cron_trigger_name_create:
  description: |
    The name for the new cron trigger.
  in: body
  required: true
  type: string

cron_trigger_next_execution_time:
  description: |
    The date and time of the next scheduled execution.
  in: body
  required: false
  type: string

cron_trigger_pattern:
  description: |
    The cron expression pattern (e.g., ``*/5 * * * *`` to run every
    5 minutes). Uses standard cron syntax.
  in: body
  required: false
  type: string

cron_trigger_project_id:
  description: |
    The UUID of the project that owns the cron trigger.
  in: body
  required: false
  type: string

cron_trigger_remaining_executions:
  description: |
    The number of remaining executions for the trigger. Must be at
    least 1. Once this reaches 0, the trigger is automatically removed.
  in: body
  required: false
  type: integer

cron_trigger_scope:
  description: |
    The scope of the cron trigger. ``private`` or ``public``.
  in: body
  required: false
  type: string

cron_trigger_updated_at:
  description: |
    The date and time when the cron trigger was last updated.
  in: body
  required: false
  type: string

cron_trigger_workflow_id:
  description: |
    The UUID of the workflow to execute on trigger.
  in: body
  required: false
  type: string

cron_trigger_workflow_id_create:
  description: |
    The UUID of the workflow to trigger. Either ``workflow_name`` or
    ``workflow_id`` must be provided.
  in: body
  required: false
  type: string

cron_trigger_workflow_input:
  description: |
    A JSON object containing input values for the triggered workflow
    executions.
  in: body
  required: false
  type: object

cron_trigger_workflow_name:
  description: |
    The name of the workflow to execute on trigger.
  in: body
  required: false
  type: string

cron_trigger_workflow_name_create:
  description: |
    The name of the workflow to trigger. Either ``workflow_name`` or
    ``workflow_id`` must be provided.
  in: body
  required: false
  type: string

cron_trigger_workflow_params:
  description: |
    A JSON object containing parameters for the triggered workflow
    executions.
  in: body
  required: false
  type: object

cron_triggers:
  description: |
    A list of cron trigger objects.
  in: body
  required: true
  type: array

execution_created_at:
  description: |
    The date and time when the execution was created.
  in: body
  required: true
  type: string

execution_description:
  description: |
    A description of the workflow execution.
  in: body
  required: false
  type: string

execution_description_update:
  description: |
    An updated description for the execution.
  in: body
  required: false
  type: string

execution_id_body:
  description: |
    The UUID of the execution. Immutable and auto-assigned, or can be
    specified by the API client if using ``source_execution_id``.
  in: body
  required: true
  type: string

execution_input:
  description: |
    A JSON object containing the workflow input values.
  in: body
  required: false
  type: object

execution_output:
  description: |
    A JSON object containing the workflow output values.
  in: body
  required: false
  type: object

execution_params:
  description: |
    A JSON object defining workflow type specific parameters.
    Supported keys include:

    - ``task_name`` - the name of the target task (reverse workflows only).
    - ``env`` - a string or JSON object containing environment variables.
    - ``evaluate_env`` - controls recursive evaluation of ``env``.
    - ``notify`` - a list of publishers to notify on state changes.
  in: body
  required: false
  type: object

execution_params_update:
  description: |
    A JSON object with updated parameters. Currently only ``env`` can be
    updated this way.
  in: body
  required: false
  type: object

execution_project_id:
  description: |
    The UUID of the project that owns the execution.
  in: body
  required: false
  type: string

execution_published_global:
  description: |
    A JSON object containing globally published variables.
  in: body
  required: false
  type: object

execution_root_execution_id:
  description: |
    Reference to the root execution UUID.
  in: body
  required: false
  type: string

execution_source_execution_id:
  description: |
    Reference to a source workflow execution UUID. When specified, the API
    replicates the source execution, copying the workflow, input, params,
    and description.
  in: body
  required: false
  type: string

execution_state:
  description: |
    The current state of the execution. One of ``IDLE``, ``RUNNING``,
    ``SUCCESS``, ``ERROR``, ``PAUSED``, or ``CANCELLED``.
  in: body
  required: true
  type: string

execution_state_info:
  description: |
    An optional state information string providing additional details
    about the current state.
  in: body
  required: false
  type: string

execution_state_update:
  description: |
    The new state for the execution. Valid transitions: ``RUNNING`` to
    ``PAUSED``, ``PAUSED`` to ``RUNNING``, or any running state to
    ``CANCELLED``, ``SUCCESS``, or ``ERROR``.
  in: body
  required: false
  type: string

execution_tags:
  description: |
    A list of tags associated with the execution.
  in: body
  required: false
  type: array

execution_task_execution_id:
  description: |
    Reference to the parent task execution UUID.
  in: body
  required: false
  type: string

execution_updated_at:
  description: |
    The date and time when the execution was last updated.
  in: body
  required: false
  type: string

execution_workflow_id:
  description: |
    The UUID of the workflow associated with the execution.
  in: body
  required: false
  type: string

execution_workflow_id_create:
  description: |
    The UUID of the workflow to execute. Either ``workflow_id`` or
    ``workflow_name`` must be provided.
  in: body
  required: false
  type: string

execution_workflow_name:
  description: |
    The name of the workflow associated with the execution.
  in: body
  required: false
  type: string

execution_workflow_name_create:
  description: |
    The name of the workflow to execute. Either ``workflow_id`` or
    ``workflow_name`` must be provided.
  in: body
  required: false
  type: string

execution_workflow_namespace:
  description: |
    The namespace of the workflow associated with the execution.
  in: body
  required: false
  type: string

executions:
  description: |
    A list of execution objects.
  in: body
  required: true
  type: array

task_created_at:
  description: |
    The date and time when the task was created.
  in: body
  required: true
  type: string

task_env:
  description: |
    A JSON object containing environment variables for the task.
  in: body
  required: false
  type: object

task_finished_at:
  description: |
    The date and time when the task finished executing.
  in: body
  required: false
  type: string

task_id_body:
  description: |
    The UUID of the task execution.
  in: body
  required: true
  type: string

task_name:
  description: |
    The name of the task.
  in: body
  required: true
  type: string

task_processed:
  description: |
