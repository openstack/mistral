{{- if and .Values.mistral.ingress.enabled (.Values.mistral.tls.enabled) (not .Values.mistral.tls.generateCerts.enabled) (not .Values.mistral.tls.secretName) (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1alpha3/TLSRoute")  (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  name: mistral
  labels:
     app: mistral
spec:
  hostnames:
    - {{ include "mistral.ingressHost" . | quote }}
  parentRefs:
    - name: {{ .Values.GatewayAPI.gatewayName }}
      namespace: {{ .Values.GatewayAPI.gatewayNamespace }}
  rules:
    - backendRefs:
        - name: mistral
          port: 8443
{{ end }}
